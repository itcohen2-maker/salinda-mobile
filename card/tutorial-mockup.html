<!DOCTYPE html>
<html lang="he" dir="rtl">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>Salinda · Tutorial Overlay Mockup</title>
<style>
  :root{
    --gold-deep:#7a4f12;
    --gold:#c9962e;
    --gold-bright:#f4cd5a;
    --gold-highlight:#fff3c9;
    --wood-dark:#3a2a16;
    --wood:#5a3d20;
  }
  *{box-sizing:border-box;margin:0;padding:0;font-family:"Heebo","Segoe UI",sans-serif;}
  body{
    min-height:100vh;
    display:flex;align-items:center;justify-content:center;
    background:#1c1206;
    padding:24px;
  }

  /* ----- the phone frame just for context ----- */
  .phone{
    position:relative;
    width:360px;height:740px;
    border-radius:42px;
    overflow:hidden;
    box-shadow:0 30px 80px rgba(0,0,0,.7);
    /* faint blurred "real app" behind the overlay */
    background:
      radial-gradient(circle at 30% 20%, #2e6b4f, #14342a 70%);
  }
  /* dim layer so the live app is visibly "paused" behind */
  .scrim{
    position:absolute;inset:0;
    background:rgba(8,5,2,.74);
    backdrop-filter:blur(3px);
  }

  /* ----- the gold-on-wood tutorial card ----- */
  .overlay{
    position:absolute;inset:0;
    display:flex;flex-direction:column;
    align-items:center;justify-content:space-between;
    padding:64px 22px 30px;
  }

  /* top bar: skip + close */
  .topbar{
    width:100%;
    display:flex;align-items:center;justify-content:space-between;
  }
  .skip{
    background:transparent;border:none;cursor:pointer;
    color:var(--gold-highlight);
    font-size:15px;font-weight:600;letter-spacing:.5px;
    opacity:.85;text-shadow:0 1px 2px rgba(0,0,0,.6);
  }
  .skip:hover{opacity:1;}

  /* the metallic gold ✕ */
  .close{
    width:42px;height:42px;border-radius:50%;
    border:1px solid rgba(255,243,201,.5);
    cursor:pointer;
    color:#3a2a10;font-size:20px;font-weight:700;
    background:
      linear-gradient(135deg,#fff3c9 0%, #f4cd5a 28%, #c9962e 60%, #7a4f12 100%);
    box-shadow:0 4px 10px rgba(0,0,0,.5), inset 0 1px 2px rgba(255,255,255,.6);
    display:flex;align-items:center;justify-content:center;
  }

  /* ----- the carved gold plank (the hero of the design) ----- */
  .plank{
    width:100%;
    border-radius:22px;
    padding:30px 26px 34px;
    position:relative;
    /* gold brushed over vertical wood grain */
    background:
      repeating-linear-gradient(90deg,
        rgba(58,42,16,.55) 0px,
        rgba(58,42,16,0) 2px,
        rgba(255,243,201,.18) 4px,
        rgba(58,42,16,0) 7px),
      linear-gradient(160deg,#f4cd5a 0%, #c9962e 38%, #9c6f1c 72%, #7a4f12 100%);
    box-shadow:
      0 18px 40px rgba(0,0,0,.55),
      inset 0 2px 3px rgba(255,243,201,.6),
      inset 0 -10px 18px rgba(58,30,8,.6);
    border:1px solid rgba(122,79,18,.8);
  }
  /* bright highlight strip like the lit edge in the photo */
  .plank::after{
    content:"";position:absolute;left:14px;right:14px;bottom:10px;height:6px;
    border-radius:6px;
    background:linear-gradient(90deg,transparent,rgba(255,255,255,.7),transparent);
    filter:blur(1px);
  }

  .step-tag{
    color:#3a2a10;font-size:13px;font-weight:700;
    letter-spacing:1px;text-transform:uppercase;opacity:.7;
  }
  .title{
    color:#2b1d08;font-size:25px;font-weight:800;
    margin:8px 0 12px;text-shadow:0 1px 0 rgba(255,243,201,.4);
  }
  .body{
    color:#3d2a0e;font-size:15.5px;line-height:1.6;font-weight:500;
  }

  /* illustration placeholder inside the card */
  .art{
    margin:18px 0 4px;height:120px;border-radius:14px;
    background:linear-gradient(135deg,rgba(43,29,8,.25),rgba(43,29,8,.05));
    border:1px dashed rgba(43,29,8,.4);
    display:flex;align-items:center;justify-content:center;
    color:#3d2a0e;font-size:13px;opacity:.7;
  }

  /* ----- bottom controls: dots + back/next ----- */
  .controls{width:100%;}
  .dots{display:flex;gap:8px;justify-content:center;margin-bottom:18px;}
  .dot{width:8px;height:8px;border-radius:50%;background:rgba(255,243,201,.3);}
  .dot.active{width:22px;border-radius:5px;background:var(--gold-bright);}

  .btn-row{display:flex;gap:12px;}
  .btn{
    flex:1;padding:15px 0;border-radius:14px;cursor:pointer;
    font-size:16px;font-weight:700;border:none;
  }
  .back{
    background:rgba(20,12,4,.5);
    color:var(--gold-highlight);
    border:1px solid rgba(255,243,201,.35);
  }
  .next{
    color:#2b1d08;
    background:linear-gradient(135deg,#fff3c9,#f4cd5a 40%,#c9962e 100%);
    box-shadow:0 6px 16px rgba(0,0,0,.45), inset 0 1px 2px rgba(255,255,255,.6);
  }

  .caption{
    position:fixed;bottom:14px;left:0;right:0;text-align:center;
    color:#8a7350;font-size:12px;letter-spacing:.5px;
  }
</style>
</head>
<body>
  <div class="phone">
    <div class="scrim"></div>

    <div class="overlay">
      <!-- top bar -->
      <div class="topbar">
        <button class="skip">דלג על ההדרכה ›</button>
        <button class="close" title="יציאה">✕</button>
      </div>

      <!-- the gold plank card -->
      <div class="plank">
        <div class="step-tag">שלב 2 מתוך 5</div>
        <div class="title">איך מחלקים קלפים</div>
        <div class="art">🃏 איור / אנימציה כאן</div>
        <div class="body">
          לחץ על חפיסת הקלפים במרכז השולחן כדי לחלק יד חדשה.
          כל שחקן מקבל את הקלפים שלו אוטומטית — נסה עכשיו!
        </div>
      </div>

      <!-- bottom controls -->
      <div class="controls">
        <div class="dots">
          <span class="dot"></span>
          <span class="dot active"></span>
          <span class="dot"></span>
          <span class="dot"></span>
          <span class="dot"></span>
        </div>
        <div class="btn-row">
          <button class="btn back">‹ חזור</button>
          <button class="btn next">המשך ›</button>
        </div>
      </div>
    </div>
  </div>

  <div class="caption">Salinda · Tutorial Overlay — mockup (gold-on-wood) · רק להמחשה</div>
</body>
</html>
