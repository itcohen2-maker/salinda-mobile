services:
  # ── Backend game server (Socket.IO) ──
  # NOTE: Web frontend is served from Vercel (project `salinda-mobile`,
  # canonical URL https://lolos-mobile.vercel.app). Render hosts only the
  # Socket.IO server below as service `lolos-mobile`.
  - type: web
    name: lolos-mobile
    runtime: node
    buildCommand: cd server && npm install && npm run build
    startCommand: cd server && npm start
    envVars:
      - key: NODE_ENV
        value: production
      - key: CORS_ORIGINS
        value: https://lolos-mobile.vercel.app,https://salinda-mobile.vercel.app
