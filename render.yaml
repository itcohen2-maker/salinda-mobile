# Render Blueprint — Lolos multiplayer API (card/server).
# Dashboard: Blueprints → Connect repository (main).
#
# NOTE: The web frontend is served from Vercel (project `salinda-mobile`,
# canonical URL https://lolos-mobile.vercel.app). Render hosts only the
# Socket.IO server below — service name `lolos-mobile`, URL
# https://lolos-mobile.onrender.com.
services:
  - type: web
    name: lolos-mobile
    runtime: node
    region: oregon
    plan: free
    rootDir: card/server
    buildCommand: npm install && npm run build
    startCommand: npm start
    healthCheckPath: /
    envVars:
      - key: NODE_VERSION
        value: "22"
      - key: CORS_ORIGINS
        value: https://lolos-mobile.vercel.app,https://salinda-mobile.vercel.app
