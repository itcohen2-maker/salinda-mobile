name: E2E

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: card

jobs:
  playwright:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      BASE_URL: http://localhost:8081
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: card/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: card/playwright-report
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: card/tests/results
          retention-days: 7

  ota-update:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: card/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Push OTA update to mobile
        run: npx eas-cli update --channel production --message "Auto OTA ${{ github.sha }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'
