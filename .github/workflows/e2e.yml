name: E2E

on:
  push:
    branches: [main]
  pull_request:

defaults:
  run:
    working-directory: card

jobs:
  playwright:
    timeout-minutes: 30
    runs-on: ubuntu-latest
    env:
      CI: 'true'
      BASE_URL: http://localhost:8081
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: card/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Install Playwright browsers
        run: npx playwright install --with-deps chromium firefox

      - name: Run E2E tests
        run: npm run test:e2e

      - name: Upload Playwright report
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: playwright-report
          path: card/playwright-report
          retention-days: 7

      - name: Upload JUnit results
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: junit-results
          path: card/tests/results
          retention-days: 7

  ota-update:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: card/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Push OTA update to mobile
        run: npx eas-cli update --channel production --message "Auto OTA ${{ github.sha }}"
        env:
          EXPO_TOKEN: ${{ secrets.EXPO_TOKEN }}
          CI: '1'

  deploy-web:
    if: github.event_name == 'push' && github.ref == 'refs/heads/main'
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: .
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm
          cache-dependency-path: card/package-lock.json

      - name: Install dependencies
        working-directory: card
        run: npm ci

      - name: Deploy to Vercel production
        id: vercel_deploy
        run: |
          OUTPUT=$(npx vercel --prod --yes --token ${{ secrets.VERCEL_TOKEN }} 2>&1)
          echo "$OUTPUT"
          DEPLOY_URL=$(echo "$OUTPUT" | grep -oE 'https://[a-zA-Z0-9-]+\.vercel\.app' | tail -1)
          echo "url=$DEPLOY_URL" >> $GITHUB_OUTPUT
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_re4UQDqRCpi3bqqW7uUkCNXu
          VERCEL_PROJECT_ID: prj_e6fXMFDkJ7Awk3zpfzurIdO2uV7F

      - name: Alias to production domain
        run: |
          npx vercel alias set ${{ steps.vercel_deploy.outputs.url }} salinda-mobile.vercel.app \
            --token ${{ secrets.VERCEL_TOKEN }}
        env:
          VERCEL_TOKEN: ${{ secrets.VERCEL_TOKEN }}
          VERCEL_ORG_ID: team_re4UQDqRCpi3bqqW7uUkCNXu
          VERCEL_PROJECT_ID: prj_e6fXMFDkJ7Awk3zpfzurIdO2uV7F
